version: '3.8'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-1234} # .env dagi 1234 bilan bir xil bo'lishi kerak
      POSTGRES_DB: quiz_db
      TZ: Asia/Tashkent
      PGTZ: Asia/Tashkent
    ports:
      - "5433:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    restart: unless-stopped

  web_admin:
    build: .
    command: >
      sh -c "alembic upgrade head &&
             python main_flask.py"
    ports:
      - "5050:5050"
    env_file:
      - .env
    environment:
      # Compose ichidagi environment .env ni "overrule" qiladi (ustidan yozadi)
      DATABASE_URL: postgresql+psycopg://postgres:1234@db:5432/quiz_db
      SYNC_DATABASE_URL: postgresql+psycopg://postgres:1234@db:5432/quiz_db
      TZ: Asia/Tashkent
    depends_on:
      - db
    restart: on-failure

  telegram_bot:
    build: .
    command: python main_bot.py
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:1234@db:5432/quiz_db
      SYNC_DATABASE_URL: postgresql+psycopg://postgres:1234@db:5432/quiz_db
      TZ: Asia/Tashkent
    depends_on:
      - db
      - web_admin
    restart: on-failure

volumes:
  pg_data: