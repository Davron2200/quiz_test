<!DOCTYPE html>
<html lang="uz">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | QuizAdmin</title>
    <script>
        const _tw_warn = console.warn;
        console.warn = (...args) => { if (args[0] && typeof args[0] === 'string' && args[0].includes('cdn.tailwindcss.com')) return; _tw_warn.apply(console, args); };
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

        body {
            font-family: 'Inter', sans-serif;
        }

        @keyframes blob {
            0% {
                transform: translate(0px, 0px) scale(1);
            }

            33% {
                transform: translate(30px, -50px) scale(1.1);
            }

            66% {
                transform: translate(-20px, 20px) scale(0.9);
            }

            100% {
                transform: translate(0px, 0px) scale(1);
            }
        }

        .animate-blob {
            animation: blob 7s infinite;
        }

        .animation-delay-2000 {
            animation-delay: 2s;
        }

        .animation-delay-4000 {
            animation-delay: 4s;
        }

        @keyframes shimmer {
            100% {
                transform: translateX(100%);
            }
        }

        .animate-fade-in-up {
            animation: fadeInUp 0.5s ease-out;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body class="bg-slate-900">
    <div class="min-h-screen flex items-center justify-center relative overflow-hidden">
        <!-- Abstract Background Elements -->
        <div
            class="absolute top-[-10%] left-[-10%] w-96 h-96 bg-purple-600 rounded-full mix-blend-multiply filter blur-3xl opacity-50 animate-blob">
        </div>
        <div
            class="absolute top-[20%] right-[-10%] w-96 h-96 bg-indigo-500 rounded-full mix-blend-multiply filter blur-3xl opacity-50 animate-blob animation-delay-2000">
        </div>
        <div
            class="absolute bottom-[-20%] left-[20%] w-96 h-96 bg-blue-500 rounded-full mix-blend-multiply filter blur-3xl opacity-50 animate-blob animation-delay-4000">
        </div>

        <div class="w-full max-w-md relative z-10 mx-4">
            <div
                class="bg-white/10 backdrop-blur-xl border border-white/20 p-8 rounded-3xl shadow-[0_8px_32px_0_rgba(31,38,135,0.37)] transform transition-on hover:-translate-y-1 duration-500">
                <div class="text-center mb-10">
                    <div
                        class="w-16 h-16 bg-gradient-to-tr from-indigo-500 to-purple-500 rounded-2xl mx-auto flex items-center justify-center mb-4 shadow-lg shadow-indigo-500/50 transform -rotate-6 hover:rotate-0 transition-transform duration-300">
                        <i class="fas fa-bolt text-2xl text-white"></i>
                    </div>
                    <h1 class="text-3xl font-extrabold text-white tracking-tight mb-2">QuizAdmin</h1>
                    <p class="text-indigo-200 font-medium">Platformaga xush kelibsiz</p>
                </div>

                {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                {% for category, message in messages %}
                <div
                    class="mb-6 p-4 rounded-xl backdrop-blur-md {% if category == 'error' %}bg-red-500/20 border border-red-500/30 text-red-100{% else %}bg-emerald-500/20 border border-emerald-500/30 text-emerald-100{% endif %} flex items-center gap-3 animate-fade-in-up">
                    <i
                        class="fas {% if category == 'error' %}fa-exclamation-circle{% else %}fa-check-circle{% endif %}"></i>
                    {{ message }}
                </div>
                {% endfor %}
                {% endif %}
                {% endwith %}

                <form method="POST" action="{{ url_for('login') }}" class="space-y-6">
                    <div class="space-y-1.5">
                        <label class="block text-sm font-medium text-indigo-100 ml-1">Username</label>
                        <div class="relative group">
                            <div
                                class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none transition-colors group-focus-within:text-indigo-400 text-indigo-200/50">
                                <i class="fas fa-user"></i>
                            </div>
                            <input type="text" name="username" required
                                class="block w-full pl-11 pr-4 py-3.5 bg-white/5 border border-white/10 rounded-xl text-white placeholder-white/30 focus:outline-none focus:ring-2 focus:ring-indigo-500/50 focus:border-indigo-500/50 transition-all duration-300"
                                placeholder="Admin login...">
                        </div>
                    </div>

                    <div class="space-y-1.5">
                        <label class="block text-sm font-medium text-indigo-100 ml-1">Parol</label>
                        <div class="relative group">
                            <div
                                class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none transition-colors group-focus-within:text-indigo-400 text-indigo-200/50">
                                <i class="fas fa-lock"></i>
                            </div>
                            <input type="password" name="password" required
                                class="block w-full pl-11 pr-4 py-3.5 bg-white/5 border border-white/10 rounded-xl text-white placeholder-white/30 focus:outline-none focus:ring-2 focus:ring-indigo-500/50 focus:border-indigo-500/50 transition-all duration-300"
                                placeholder="••••••••">
                        </div>
                    </div>

                    <div class="pt-2">
                        <button type="submit"
                            class="relative w-full overflow-hidden group py-3.5 px-4 rounded-xl font-semibold text-white bg-gradient-to-r from-indigo-500 via-purple-500 to-indigo-500 hover:bg-gradient-to-br transition-all duration-500 shadow-[0_0_20px_rgba(99,102,241,0.4)] hover:shadow-[0_0_30px_rgba(168,85,247,0.6)] hover:-translate-y-0.5">
                            <span class="relative z-10 flex justify-center items-center gap-2">
                                Tizimga kirish <i
                                    class="fas fa-arrow-right group-hover:translate-x-1 transition-transform"></i>
                            </span>
                            <div
                                class="absolute inset-0 -translate-x-full group-hover:animate-[shimmer_1.5s_infinite] bg-gradient-to-r from-transparent via-white/20 to-transparent skew-x-12">
                            </div>
                        </button>
                    </div>
                </form>
            </div>
            <p class="text-center text-sm text-indigo-200/50 mt-8">QuizAdmin v2.0 - Premium Edition</p>
        </div>
    </div>
</body>

</html>
